<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>구걸 마스터: 밸런스 패치 v2.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #1a1f35;
            --bg-card-hover: #242b45;
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --success: #10b981;
            --warning: #fbbf24;
            --danger: #ef4444;
            --purple: #a855f7;
            --cyan: #06b6d4;
            --text-light: #f1f5f9;
            --text-dim: #94a3b8;
            --disabled: #475569;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 360px;
            height: 640px;
            background: linear-gradient(135deg, #1a1f35 0%, #0a0e1a 100%);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(99, 102, 241, 0.2);
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(99, 102, 241, 0.3);
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        #inputLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
        }

        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s;
        }

        #loadingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--disabled);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

            const data = localStorage.getItem(SAVE_KEY);

                try {
                    const loaded = JSON.parse(data);
                    gameState = { ...gameState, ...loaded };

                    // skillPoints 마이그레이션

                        gameState.diamond = (gameState.diamond || 0) + (gameState.skillPoints || 0);
                        delete gameState.skillPoints;
                    }

                    // 기존 critBoost → critChance + critDamage 분리
                    if (gameState.skills?.critBoost !== undefined) {
                        const oldLevel = gameState.skills.critBoost;
                        gameState.skills.critChance = Math.floor(oldLevel / 2);
                        gameState.skills.critDamage = Math.floor(oldLevel / 2);
                        delete gameState.skills.critBoost;
                    }

                    // 기본값 설정
                    if (!gameState.skills) {
                        gameState.skills = {
                            clickPower: 0, autoSpeed: 0, critChance: 0,
                            critDamage: 0, goldBonus: 0, assetBoost: 0
                        };
                    }

                    if (gameState.skills.critChance === undefined) {
                        gameState.skills.critChance = 0;
                    }
                    if (gameState.skills.critDamage === undefined) {
                        gameState.skills.critDamage = 0;
                    }

                } catch (e) {
                    console.error("로드 실패", e);
                }
            }
        }
        // ═══════════════════════════════════════════════════════════
        // 계산 함수
        // ═══════════════════════════════════════════════════════════

        function getRelicBonus(effect) {
            let bonus = 0;
            if (!gameState.relicInventory) return 0;
            Object.keys(gameState.relicInventory).forEach(relicId => {
                const relic = Relics.find(r => r.id === relicId);
                if (relic && (relic.effect === effect || relic.effect === 'all')) bonus += relic.value;
            });
            return bonus;
        }

        function getClickPower() {
            let base = BALANCE.clickBase + (gameState.clickLevel - 1) * BALANCE.clickGrowth;
            let realEstateMult = 1;
            gameState.ownedItems['부동산'].forEach(idx => {
                const bonuses = [0.1, 0.15, 0.2, 0.3, 0.5, 0.8, 1.2, 2.0, 3.0, 5.0, 8.0, 12.0, 18.0, 25.0, 35.0, 50.0, 70.0, 100.0, 150.0, 250.0];
                realEstateMult += bonuses[idx] || 0;
            });
            let cityMult = 1;
            gameState.ownedItems['도시'].forEach(idx => {
                const bonuses = [0.05, 0.08, 0.12, 0.18, 0.25, 0.35, 0.5, 0.75, 1.2, 2.0, 3.0, 4.5, 6.5, 9.0, 13.0, 18.0, 25.0, 35.0, 50.0, 100.0];
                cityMult += bonuses[idx] || 0;
            });
            let skillMult = 1 + (gameState.skills.clickPower * 0.1); // 15% -> 10%
            let prestigeMult = gameState.prestigeBonus;
            let eventMult = (gameState.currentEvent?.effect === 'click') ? gameState.currentEvent.value : 1;
            let relicMult = 1 + getRelicBonus('click');
            let potionMult = 1;
            activePotions.forEach(p => { if (p.type === 'click') potionMult = Math.max(potionMult, p.multiplier); });
            return Math.floor(base * realEstateMult * cityMult * skillMult * prestigeMult * eventMult * relicMult * potionMult);
        }

        function getAutoIncome() {
            if (gameState.autoLevel === 0) return 0;
            let base = BALANCE.autoBase + (gameState.autoLevel - 1) * BALANCE.autoGrowth;
            let corpMult = 1;
            gameState.ownedItems['기업'].forEach(idx => {
                const bonuses = [0.2, 0.3, 0.5, 0.8, 1.2, 2.0, 3.0, 5.0, 8.0, 15.0, 22.0, 32.0, 45.0, 65.0, 90.0, 130.0, 180.0, 250.0, 350.0, 500.0];
                corpMult += bonuses[idx] || 0;
            });
            let cityMult = 1;
            gameState.ownedItems['도시'].forEach(idx => {
                const bonuses = [0.05, 0.08, 0.12, 0.18, 0.25, 0.35, 0.5, 0.75, 1.2, 2.0, 3.0, 4.5, 6.5, 9.0, 13.0, 18.0, 25.0, 35.0, 50.0, 100.0];
                cityMult += bonuses[idx] || 0;
            });
            let skillMult = 1 + (gameState.skills.autoSpeed * 0.15);
            let prestigeMult = gameState.prestigeBonus;
            let eventMult = (gameState.currentEvent?.effect === 'auto') ? gameState.currentEvent.value : 1;
            let relicMult = 1 + getRelicBonus('auto');
            let potionMult = 1;
            activePotions.forEach(p => { if (p.type === 'auto') potionMult = Math.max(potionMult, p.multiplier); });
            return Math.floor(base * corpMult * cityMult * skillMult * prestigeMult * eventMult * relicMult * potionMult);
        }

        // 크리티컬 데미지 계산
        function getCritDamage() {
            let base = BALANCE.critMulti; // 기본 3배

            // 미술품으로 인한 크리티컬 데미지 증가
            gameState.ownedItems['미술품'].forEach(idx => {
                const bonuses = [0.5, 0.8, 1.2, 1.8, 2.5, 3.5, 5.0, 7.0, 10.0, 15.0, 22.0, 32.0, 45.0, 65.0, 90.0, 130.0, 180.0, 250.0, 350.0, 500.0];
                base += bonuses[idx] || 0;
            });

            // 스킬로 인한 크리티컬 데미지 증가 (레벨당 +0.5배)
            base += gameState.skills.critDamage * 0.5;

            return base;
        }
        function getCritChance() {
            let base = BALANCE.critChance; // 0.05 (5%)

            // 스킬로 인한 크리티컬 확률 증가 (레벨당 +2%)
            base += gameState.skills.critChance * 0.02;

            // 이벤트 효과
            if (gameState.currentEvent?.effect === 'crit') {
                base *= gameState.currentEvent.value;
            }

            // 유물 효과
            base += getRelicBonus('crit');

            return Math.min(base, 0.95); // 최대 95%
        }

        function getUpgradeCost(type, level) {
            let base = BALANCE.upgradeCostBase * Math.pow(BALANCE.upgradeCostGrowth, level - 1);
            if (level < 50) base *= 0.6;
            else if (level < 100) base *= 0.8;
            return Math.floor(base);
        }

        function getMultiUpgradeCost(type, currentLevel, count) {
            let total = 0;
            for (let i = 0; i < count; i++) total += getUpgradeCost(type, currentLevel + i);
            return total;
        }


        function getPrestigeReward() {
            if (gameState.totalGoldEarned < BALANCE.prestigeThreshold) return 0;
            // 3 * log10 → 2 * log10 (획득량 감소)
            return Math.max(1, Math.floor(2 * Math.log10(gameState.totalGoldEarned / BALANCE.prestigeThreshold + 1)));
        }

        // 환생 시 다이아 보상 계산
        function getPrestigeDiamondReward() {
            if (gameState.totalGoldEarned < BALANCE.prestigeThreshold) return 0;
            // 총 획득 골드에 비례하여 다이아 지급 (로그 스케일)
            // 100만 골드당 약 5다이아, 10억 골드당 약 15다이아 정도
            return Math.max(5, Math.floor(3 * Math.log10(gameState.totalGoldEarned / 100000 + 1)) +
                Math.floor(gameState.prestige * 0.5)); // 기존 환생 레벨당 추가 보너스
        }

        // ═══════════════════════════════════════════════════════════
        // 게임 로직
        // ═══════════════════════════════════════════════════════════

        function handleClick(x, y) {
            let power = getClickPower();
            let isCrit = Math.random() < getCritChance();

            if (isCrit) {
                const critMulti = getCritDamage(); // 변경: 크리티컬 데미지 적용
                power *= critMulti;
                shakeAmount = 10;
                spawnCritEffect(x, y);
                playCoinSound(true);
                tryDropDiamond(true);
            } else {
                playCoinSound(false);
                tryDropDiamond(false);
            }

            if (gameState.skills.goldBonus > 0) {
                power *= (1 + gameState.skills.goldBonus * 0.08);
            }

            if (gameState.currentEvent?.effect === 'gold') {
                power *= gameState.currentEvent.value;
            }

            power *= (1 + getRelicBonus('gold'));

            gameState.gold += power;
            gameState.totalGoldEarned += power;
            goldPulse = 1;

            spawnParticle(x, y, power, isCrit);
            checkAchievements();
            save();
        }

        function tryDropDiamond(isCrit) {
            let chance = isCrit ? BALANCE.diamondDropChanceCrit : BALANCE.diamondDropChance;
            if (gameState.currentEvent?.effect === 'diamond') chance *= gameState.currentEvent.value;
            chance *= (1 + getRelicBonus('diamond'));
            if (Math.random() < chance) {
                const amount = isCrit ? Math.floor(Math.random() * 3) + 2 : 1;
                gameState.diamond += amount;
                gameState.totalDiamondEarned += amount;
                diamondPulse = 1;
                spawnDiamondParticle(180, 60, amount);
                checkAchievements();
            }
        }

        function processAutoIncome() {
            const income = getAutoIncome();
            if (income > 0) { gameState.gold += income; gameState.totalGoldEarned += income; }
            if (gameState.shopItems.autoClicker && autoClicker.enabled === false) { // 치트키와 분리
                handleClick(180, 300);
            }
        }

        function buyUpgrade(type, count = 1) {
            const level = (type === 'click') ? gameState.clickLevel : gameState.autoLevel;
            const cost = getMultiUpgradeCost(type, level, count);
            if (gameState.gold >= cost) {
                gameState.gold -= cost;
                if (type === 'click') gameState.clickLevel += count;
                else gameState.autoLevel += count;
                buttonPulses.set(type + count, 1);
                playSound('upgrade');
                save(); return true;
            } return false;
        }

        function buyAsset(category, index) {
            const asset = Assets[category][index];
            if (gameState.gold >= asset.p && !gameState.ownedItems[category].includes(index)) {
                gameState.gold -= asset.p;
                gameState.ownedItems[category].push(index);

                const totalAssets = Object.values(gameState.ownedItems).flat().length;
                // skillPoints 대신 다이아 지급
                if (totalAssets % 15 === 0) {
                    gameState.diamond += 5;
                    showNotification("🎯 자산 컬렉션! +5💎");
                }

                buttonPulses.set(category + index, 1);
                playSound('purchase');
                checkAchievements();
                save();
                return true;
            }
            return false;
        }

        // 스킬 레벨별 다이아 비용 계산
        function getSkillCost(skillId) {
            const level = gameState.skills[skillId];
            // 기본 비용 + 레벨당 증가 (레벨 1 = 5다이아, 100 = 500다이아)
            return Math.floor(5 + (level * 5));
        }

        function upgradeSkill(skill) {
            const currentLevel = gameState.skills[skill];
            const maxLevel = 100; // 최대 레벨 100으로 확장
            const cost = getSkillCost(skill);

            // skillPoints 체크 → diamond 체크
            if (currentLevel < maxLevel && gameState.diamond >= cost) {
                gameState.diamond -= cost;
                gameState.skills[skill]++;

                showNotification(`${getSkillName(skill)} Lv.${currentLevel + 1}! (-${cost}💎)`);
                checkAchievements();
                save();
                return true;
            } else if (currentLevel >= maxLevel) {
                showNotification(`최대 레벨 도달!`);
                return false;
            } else {
                showNotification(`다이아가 부족합니다! (${cost}💎 필요)`);
                return false;
            }
        }

        function getSkillName(skill) {
            const names = {
                clickPower: "클릭 파워",
                autoSpeed: "자동 속도",
                critChance: "크리티컬 확률",  // 신규
                critDamage: "크리티컬 데미지", // 변경
                goldBonus: "골드 보너스",
                assetBoost: "자산 효율"
            };
            return names[skill] || skill;
        }

        function prestige() {
            if (gameState.totalGoldEarned >= BALANCE.prestigeThreshold) {
                const reward = getPrestigeReward();
                if (reward > 0) {
                    // 시작 골드 대폭 감소 (1000 * 1.5^reward → 500 * 1.2^reward)
                    const goldReward = Math.floor(500 * Math.pow(1.2, reward));

                    // 다이아 보상 계산
                    const diamondReward = getPrestigeDiamondReward();

                    gameState.gold = goldReward;
                    gameState.totalGoldEarned = 0;
                    gameState.clickLevel = 1;
                    gameState.autoLevel = 0;
                    gameState.ownedItems = { '부동산': [], '미술품': [], '기업': [], '도시': [] };
                    gameState.prestige += reward;

                    // 다이아 지급
                    gameState.diamond += diamondReward;
                    gameState.totalDiamondEarned += diamondReward;

                    // 환생 보너스 증가율 더 완만하게
                    gameState.prestigeBonus = 1 + (Math.log(gameState.prestige + 1) * BALANCE.prestigeBonus) + getRelicBonus('prestige');

                    // 알림 메시지에 다이아 보상 추가
                    showNotification(`🌟 환생! +${reward} Lv, ${formatGold(goldReward)}G, +${diamondReward}💎`);
                    checkAchievements();
                    save();
                    return true;
                }
            }
            return false;
        }


        function updateEvent() {
            if (gameState.currentEvent) {
                gameState.eventTimer--;
                if (gameState.eventTimer <= 0) {
                    gameState.currentEvent = null;
                }
            } else {
                if (frameCount % 1800 === 0 && Math.random() < 0.3) {
                    const event = Events[Math.floor(Math.random() * Events.length)];
                    gameState.currentEvent = { ...event };
                    gameState.eventTimer = event.duration;
                    showNotification(event.name);
                }
            }
        }

        function buyShopItem(itemKey) {
            const item = ShopItems[itemKey];
            if (item.requirePrestige && gameState.prestige < item.requirePrestige) {
                showNotification(`환생 ${item.requirePrestige} 필요!`); return false;
            }
            if (item.permanent) {
                if (!gameState.shopItems[itemKey] && gameState.gold >= item.price) {
                    gameState.gold -= item.price;
                    gameState.shopItems[itemKey] = true;
                    showNotification(`${item.name} 구매 완료!`);
                    playSound('purchase'); save(); return true;
                }
            } else {
                if (gameState.gold >= item.price) {
                    gameState.gold -= item.price;

                    // 같은 타입의 기존 물약 찾기
                    const existing = activePotions.find(p => p.type === item.type);
                    if (existing) {
                        // 지속시간 합산 (중첩)
                        existing.timer += item.duration;
                        existing.multiplier = Math.max(existing.multiplier, item.multiplier);
                    } else {
                        // 새 물약 추가
                        activePotions.push({
                            type: item.type,
                            multiplier: item.multiplier,
                            timer: item.duration
                        });
                    }

                    showNotification(`${item.name} 사용! (${item.duration / 60}초)`);
                    playSound('purchase'); save(); return true;
                }
            } return false;
        }
        function updatePotions() {
            activePotions = activePotions.filter(potion => {
                potion.timer--;
                return potion.timer > 0;
            });
        }

        function pullRelic() {
            if (gameState.diamond >= 10) {
                gameState.diamond -= 10;
                const roll = Math.random();
                let rarity;
                if (roll < 0.01) rarity = 'legendary';
                else if (roll < 0.10) rarity = 'epic';
                else if (roll < 0.35) rarity = 'rare';
                else rarity = 'common';
                const pool = Relics.filter(r => r.rarity === rarity);
                const relic = pool[Math.floor(Math.random() * pool.length)];
                if (!gameState.relicInventory[relic.id]) gameState.relicInventory[relic.id] = 0;
                gameState.relicInventory[relic.id]++;
                showNotification(`${relic.name} 획득!`);
                playSound('purchase');
                checkAchievements(); save(); return relic;
            } return null;
        }

        function checkAchievements() {
            const a = gameState.achievements;

            // skillPoints 증가 코드 모두 제거
            if (!a.firstClick && gameState.totalGoldEarned > 0) {
                a.firstClick = true;
                gameState.diamond += 1; // 대신 다이아 지급
                showNotification("🏆 첫 클릭! +1💎");
            }

            if (!a.gold1k && gameState.totalGoldEarned >= 1000) {
                a.gold1k = true;
                gameState.diamond += 2;
                showNotification("🏆 천금 달성! +2💎");
            }

            if (!a.gold100k && gameState.totalGoldEarned >= 100000) {
                a.gold100k = true;
                gameState.diamond += 5;
                showNotification("🏆 십만장자! +5💎");
            }

            if (!a.gold1m && gameState.totalGoldEarned >= 1000000) {
                a.gold1m = true;
                gameState.diamond += 10;
                showNotification("🏆 백만장자! +10💎");
            }

            if (!a.gold10m && gameState.totalGoldEarned >= 10000000) {
                a.gold10m = true;
                gameState.diamond += 20;
                showNotification("🏆 천만장자! +20💎");
            }

            if (!a.gold100m && gameState.totalGoldEarned >= 100000000) {
                a.gold100m = true;
                gameState.diamond += 50;
                showNotification("🏆 억만장자! +50💎");
            }

            const totalAssets = Object.values(gameState.ownedItems).flat().length;

            if (!a.firstAsset && totalAssets >= 1) {
                a.firstAsset = true;
                gameState.diamond += 3;
                showNotification("🏆 첫 자산 획득! +3💎");
            }

            if (!a.collector10 && totalAssets >= 10) {
                a.collector10 = true;
                gameState.diamond += 10;
                showNotification("🏆 수집가! +10💎");
            }

            if (!a.collector20 && totalAssets >= 20) {
                a.collector20 = true;
                gameState.diamond += 25;
                showNotification("🏆 대수집가! +25💎");
            }

            if (!a.prestige1 && gameState.prestige >= 1) {
                a.prestige1 = true;
                gameState.diamond += 30;
                showNotification("🏆 첫 환생! +30💎");
            }

            if (!a.firstDiamond && gameState.totalDiamondEarned >= 1) {
                a.firstDiamond = true;
                showNotification("🏆 첫 다이아!");
            }

            if (!a.firstRelic && Object.keys(gameState.relicInventory).length >= 1) {
                a.firstRelic = true;
                gameState.diamond += 15;
                showNotification("🏆 첫 유물! +15💎");
            }

            const totalSkills = Object.values(gameState.skills).reduce((a, b) => a + b, 0);
            if (!a.skill5 && totalSkills >= 5) {
                a.skill5 = true;
                gameState.diamond += 5;
                showNotification("🏆 숙련자! +5💎");
            }
        }

        // ═══════════════════════════════════════════════════════════
        // 렌더링 시스템
        // ═══════════════════════════════════════════════════════════

        function formatGold(num) {
            if (num >= 1e18) return (num / 1e18).toFixed(2) + "E";
            if (num >= 1e15) return (num / 1e15).toFixed(2) + "P";
            if (num >= 1e12) return (num / 1e12).toFixed(2) + "T";
            if (num >= 1e9) return (num / 1e9).toFixed(2) + "B";
            if (num >= 1e6) return (num / 1e6).toFixed(2) + "M";
            if (num >= 1e3) return (num / 1e3).toFixed(2) + "K";
            return Math.floor(num).toLocaleString();
        }

        function drawRoundRect(x, y, w, h, r, fill, stroke = null) {
            ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
            if (fill) { ctx.fillStyle = fill; ctx.fill(); } if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
        }

        function drawGlow(x, y, w, h, r, color, alpha = 0.3) {
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            drawRoundRect(x, y, w, h, r, `rgba(0,0,0,${alpha})`);
            ctx.shadowBlur = 0;
        }

        function drawCard(x, y, w, h, color = '#1a1f35') {
            // 좌표 정수화
            x = Math.round(x);
            y = Math.round(y);
            w = Math.round(w);
            h = Math.round(h);

            ctx.save();

            // 배경 그라디언트
            const gradient = ctx.createLinearGradient(x, y, x, y + h);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, shadeColor(color, -20));

            // 그림자 설정
            ctx.shadowColor = 'rgba(79, 70, 229, 0.3)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 4;

            // 배경 그리기
            ctx.fillStyle = gradient;
            drawRoundRect(x, y, w, h, 14, gradient);

            // 그림자 제거 (테두리에는 그림자 적용 안 함)
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // 테두리 (0.5px 오프셋으로 선명하게)
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(99, 102, 241, 0.4)';

            drawRoundRect(
                x + 0.5,
                y + 0.5,
                w - 1,
                h - 1,
                13,
                null,
                ctx.strokeStyle
            );

            ctx.restore();
        }

        function shadeColor(color, percent) {
            const num = parseInt(color.replace("#", ""), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, Math.max(0, (num >> 16) + amt));
            const G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amt));
            const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
            return "#" + (0x1000000 + (R << 16) + (G << 8) + B).toString(16).slice(1);
        }

        function drawProgressBar(x, y, w, h, progress, color) {
            // 배경
            drawRoundRect(x, y, w, h, h / 2, 'rgba(15, 23, 42, 0.8)');

            // 진행도
            const fillW = Math.max(h, w * progress);

            const gradient = ctx.createLinearGradient(x, y, x + fillW, y);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, shadeColor(color, 30));

            drawRoundRect(x, y, fillW, h, h / 2, gradient);

            // 글로우
            if (progress > 0) {
                ctx.shadowColor = color;
                ctx.shadowBlur = 15;
                drawRoundRect(x, y, fillW, h, h / 2, 'transparent');
                ctx.shadowBlur = 0;
            }
        }

        function render() {
            ctx.save();
            if (shakeAmount > 0) {
                ctx.translate(
                    (Math.random() - 0.5) * shakeAmount,
                    (Math.random() - 0.5) * shakeAmount
                );
                shakeAmount *= 0.9;
            }

            // 배경 그라디언트
            const gradient = ctx.createLinearGradient(0, 0, 0, 640);
            gradient.addColorStop(0, '#1a1f35');
            gradient.addColorStop(0.5, '#0f172a');
            gradient.addColorStop(1, '#0a0e1a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 360, 640);

            // 배경 패턴
            ctx.globalAlpha = 0.03;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(Math.sin(frameCount * 0.01 + i) * 180 + 180,
                    Math.cos(frameCount * 0.008 + i) * 320 + 320,
                    100, 0, Math.PI * 2);
                ctx.fillStyle = '#4f46e5';
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            drawTopBar();

            clickBoxes = [];
            const tab = gameState.currentTab;

            if (tab === '구걸') renderBegging();
            else if (tab === '강화') renderUpgrade();
            else if (tab === '스킬') renderSkills();
            else if (tab === '자산') renderAssets();
            else if (tab === '환생') renderPrestige();
            else if (tab === '상점') renderShop();
            else if (tab === '유물') renderRelics();
            else if (Assets[tab]) renderStore(tab);

            drawTabBar();
            renderParticles();

            if (gameState.notification) {
                drawNotification();
            }

            ctx.restore();
        }
        function drawTopBar() {
            // 메인 카드
            drawCard(10, 10, 340, 110, '#1a1f35');

            // 골드 - 위치 조정
            const pulse = 1 + goldPulse * 0.15;
            goldPulse *= 0.85;

            ctx.save();
            ctx.translate(45, 35);  // 100 → 30으로 변경
            ctx.scale(pulse, pulse);

            ctx.fillStyle = 'rgba(251, 191, 36, 0.2)';
            ctx.beginPath();
            ctx.arc(0, 0, 18, 0, Math.PI * 2);
            ctx.fill();

            ctx.font = '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('💰', 0, 7);

            ctx.fillStyle = '#fbbf24';
            ctx.font = 'bold 18px Noto Sans KR';  // 20 → 18로 축소
            ctx.textAlign = 'left';
            ctx.fillText(formatGold(gameState.gold), 25, 5);
            ctx.restore();

            // 다이아 - 위치 조정
            const dpulse = 1 + diamondPulse * 0.15;
            diamondPulse *= 0.85;

            ctx.save();
            ctx.translate(260, 35);  // 260 → 200으로 변경
            ctx.scale(dpulse, dpulse);

        function drawUpgradeSection(type, title, level, y) {

            if (pulse > 0) {
                drawGlow(20, y, 320, 70, 14, '#4f46e5', pulse);

        // 입력 처리
        // ═══════════════════════════════════════════════════════════

        inputLayer.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (360 / rect.width);
            const y = (e.clientY - rect.top) * (640 / rect.height);

            let handled = false;

            for (const box of clickBoxes) {
                if (x >= box.x && x <= box.x + box.w && y >= box.y && y <= box.y + box.h) {
                    handled = true;

                    if (box.type === 'tab') {
                        gameState.currentTab = box.tab;
                        gameState.scrollOffset = 0;
                        playSound('click');
                    } else if (box.type === 'begging') {
                        handleClick(x, y);
                    } else if (box.type === 'upgrade') {
                        buyUpgrade(box.subtype, box.count);
                    } else if (box.type === 'skill') {
                        upgradeSkill(box.skill);
                    } else if (box.type === 'asset') {
                        buyAsset(box.category, box.index);
                    } else if (box.type === 'prestige') {
                        if (confirm('정말 환생하시겠습니까?\n\n모든 골드와 자산이 초기화되지만,\n영구 보너스와 시작 골드를 받습니다.')) {
                            prestige();
                        }
                    } else if (box.type === 'shop') {
                        buyShopItem(box.item);
                    } else if (box.type === 'relic_pull') {
                        const relic = pullRelic();
                        if (relic) {
                            console.log('획득:', relic.name);
                        }
                    }

                    break;
                }
            }

            if (!handled && gameState.currentTab === '구걸') {
                handleClick(x, y);
            }
        });

        inputLayer.addEventListener('wheel', (e) => {
            const rect = canvas.getBoundingClientRect();
            const y = (e.clientY - rect.top) * (640 / rect.height);

            if (y >= 580) {
                gameState.tabScroll = (gameState.tabScroll || 0) + e.deltaY * 0.5;
                const maxScroll = (65 * 11) - 360;
                gameState.tabScroll = Math.max(0, Math.min(gameState.tabScroll, maxScroll));
            } else if (Assets[gameState.currentTab] || gameState.currentTab === '스킬' || gameState.currentTab === '유물' || gameState.currentTab === '상점' || gameState.currentTab === '환생') { // 🔥 상점 추가
                gameState.scrollOffset += e.deltaY * 0.5;
                const maxScroll = 2000;
                gameState.scrollOffset = Math.max(0, Math.min(gameState.scrollOffset, maxScroll));
            }
        });

        let isDragging = false;
        let startY = 0;
        let startX = 0;
        let lastY = 0;
        let lastX = 0;
        let velocityY = 0;
        let velocityX = 0;
        let isHorizontal = null;

        inputLayer.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];

            const x = (touch.clientX - rect.left) * (360 / rect.width);
            const y = (touch.clientY - rect.top) * (640 / rect.height);

            isDragging = true;
            startY = lastY = y;
            startX = lastX = x;
            velocityY = 0;
            velocityX = 0;
            isHorizontal = null;
        });

        inputLayer.addEventListener('touchmove', (e) => {
            if (!isDragging) return;

            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (360 / rect.width);
            const y = (touch.clientY - rect.top) * (640 / rect.height);

            const deltaY = lastY - y;
            const deltaX = lastX - x;

            velocityY = deltaY;
            velocityX = deltaX;

            if (isHorizontal === null) {
                isHorizontal = Math.abs(deltaX) > Math.abs(deltaY);
            }

            if (isHorizontal) {
                gameState.tabScroll += deltaX;
                const maxScroll = (65 * 11) - 360;
                gameState.tabScroll = Math.max(0, Math.min(gameState.tabScroll, maxScroll));
            } else if (Assets[gameState.currentTab] || gameState.currentTab === '스킬' || gameState.currentTab === '유물' || gameState.currentTab === '상점' || gameState.currentTab === '환생') { // 🔥 상점 추가
                gameState.scrollOffset += deltaY;
                const maxScroll = 2000;
                gameState.scrollOffset = Math.max(0, Math.min(gameState.scrollOffset, maxScroll));
            }

            lastY = y;
            lastX = x;
            e.preventDefault();
        }, { passive: false });

        inputLayer.addEventListener('touchend', () => {
            isDragging = false;

            const friction = 0.93;

            function inertia() {
                if (Math.abs(velocityY) < 0.1 && Math.abs(velocityX) < 0.1) return;

                if (isHorizontal) {
                    gameState.tabScroll += velocityX;
                    const maxScroll = (65 * 11) - 360;
                    gameState.tabScroll = Math.max(0, Math.min(gameState.tabScroll, maxScroll));
                    velocityX *= friction;
                } else {
                    gameState.scrollOffset += velocityY;
                    const maxScroll = 2000;
                    gameState.scrollOffset = Math.max(0, Math.min(gameState.scrollOffset, maxScroll));
                    velocityY *= friction;
                }

                requestAnimationFrame(inertia);
            }

            inertia();
        });

        // ═══════════════════════════════════════════════════════════
        // 사운드
        // ═══════════════════════════════════════════════════════════

        function playSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (type === 'click') {
                    oscillator.frequency.value = 400;
                    gainNode.gain.value = 0.1;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.05);
                } else if (type === 'upgrade') {
                    oscillator.frequency.value = 600;
                    gainNode.gain.value = 0.15;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'purchase') {
                    oscillator.frequency.value = 800;
                    gainNode.gain.value = 0.2;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.15);
                }
            } catch (e) { }
        }

        function playCoinSound(isCrit = false) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (isCrit) {
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                    gainNode.gain.value = 0.2;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.15);
                } else {
                    oscillator.type = 'square';
                    oscillator.frequency.value = 600;
                    gainNode.gain.value = 0.1;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.05);
                }
            } catch (e) { }
        }

        // ═══════════════════════════════════════════════════════════
        // 게임 루프
        // ═══════════════════════════════════════════════════════════

        function gameLoop() {
            update(); render(); requestAnimationFrame(gameLoop);
        }

        function update() {
            frameCount++;
            if (frameCount % AUTO_TICK_RATE === 0) processAutoIncome();
            if (gameState.currentEvent) {
                gameState.eventTimer--;
                if (gameState.eventTimer <= 0) gameState.currentEvent = null;
            } else if (frameCount % 1800 === 0 && Math.random() < 0.2) {
                const event = Events[Math.floor(Math.random() * Events.length)];
                gameState.currentEvent = { ...event, timer: event.duration };
                showNotification(event.name);
            }
            activePotions = activePotions.filter(p => { p.timer--; return p.timer > 0; });
            if (frameCount % (FPS * 5) === 0) save();
        }

            if (autoClicker.enabled) handleClick(180, 300);
        }, 150);
    </script>
